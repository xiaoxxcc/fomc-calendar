name: China Holiday Calendar Updater

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/holidayxiao-update.yml'
  schedule:
    # 每月 5、15、25 日 UTC 13:00（北京时间 21:00）
    - cron: '0 13 5,15,25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holiday:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: 3. 抓取并生成节假日 JSON
        run: |
          cat > fetch_holiday.py << 'PYEOF'
          import requests
          from bs4 import BeautifulSoup
          import re
          import json
          import traceback
          from datetime import datetime, timezone, timedelta

          SEARCH_URL = "https://sousuo.www.gov.cn/sousuo/search.shtml"
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "zh-CN,zh;q=0.9",
          }

          def beijing_now():
              return datetime.now(timezone.utc).astimezone(timezone(timedelta(hours=8)))

          def get_text(url, params=None):
              """通用请求函数，返回UTF-8文本"""
              resp = requests.get(url, params=params, headers=HEADERS, timeout=30)
              resp.encoding = "utf-8"
              return resp.text

          def search_detail_link(year):
              """搜索指定年份通知的详情页链接，带备选策略"""
              target_title = f"国务院办公厅关于{year}年部分节假日安排的通知"
              
              # 策略1：精确搜索
              params_exact = {
                  "code": "17da70961a7",
                  "dataTypeId": "107",
                  "searchWord": f"{year}年部分节假日安排的通知"
              }
              html = get_text(SEARCH_URL, params_exact)
              soup = BeautifulSoup(html, "lxml")
              for a in soup.find_all("a", string=lambda t: t and t.strip() == target_title):
                  href = a.get("href")
                  if href:
                      if href.startswith("/"):
                          href = "https://www.gov.cn" + href
                      print(f"  [精确搜索] 找到链接")
                      return href

              # 策略2：通用搜索，然后筛选
              print(f"  [精确搜索] 未找到，尝试通用搜索...")
              params_general = {
                  "code": "17da70961a7",
                  "dataTypeId": "107",
                  "searchWord": "部分节假日安排的通知"
              }
              html = get_text(SEARCH_URL, params_general)
              soup = BeautifulSoup(html, "lxml")
              for a in soup.find_all("a", string=lambda t: t and t.strip() == target_title):
                  href = a.get("href")
                  if href:
                      if href.startswith("/"):
                          href = "https://www.gov.cn" + href
                      print(f"  [通用搜索] 找到链接")
                      return href

              return None

          def extract_main_text(html):
              """从详情页提取正文文本，多种选择器降级"""
              soup = BeautifulSoup(html, "lxml")
              selectors = [
                  "div.pages_content",
                  "div#UCAP-CONTENT",
                  "div.article-content",
                  "div.article_con",
                  "div.content",
                  "div.TRS_Editor",
                  "div.news_content"
              ]
              for sel in selectors:
                  container = soup.select_one(sel)
                  if container:
                      return container.get_text("\n", strip=True)
              # 最终回退
              body = soup.find("body")
              if body:
                  return body.get_text("\n", strip=True)
              return soup.get_text("\n", strip=True)

          def parse_detail_page(html, year):
              """解析正文，返回假期列表，处理合并假期"""
              text = extract_main_text(html)
              if not text:
                  print(f"  警告：{year} 年正文为空")
                  return []
              print(f"  正文前100字符：{text[:100]}")
              
              # 匹配假期段落：一、元旦：... 二、春节：...
              part_pat = re.compile(
                  r"([一二三四五六七]、\s*((?:元旦|春节|清明节|劳动节|端午节|中秋节|国庆节)[、，]?(?:元旦|春节|清明节|劳动节|端午节|中秋节|国庆节)?)[：:]\s*)(.*?)(?=[一二三四五六七]、\s*(?:元旦|春节|清明节|劳动节|端午节|中秋节|国庆节)|$)",
                  re.DOTALL
              )
              holidays = []
              for prefix, complex_name, detail in part_pat.findall(text):
                  names = re.split(r"[、，]", complex_name)
                  off = []
                  # 1. 放假区间
                  range_pat = re.compile(r"(\d{1,2})月(\d{1,2})日[至到\-~]+(?:(\d{1,2})月)?(\d{1,2})日")
                  for m in range_pat.finditer(detail):
                      m1, d1 = int(m.group(1)), int(m.group(2))
                      m2 = int(m.group(3)) if m.group(3) else m1
                      d2 = int(m.group(4))
                      off.append([f"{year:04d}-{m1:02d}-{d1:02d}", f"{year:04d}-{m2:02d}-{d2:02d}"])
                  # 2. 单日放假（如元旦不调休）
                  if not off:
                      single = re.search(r"(\d{1,2})月(\d{1,2})日.*?放假", detail)
                      if single:
                          m, d = int(single.group(1)), int(single.group(2))
                          off.append([f"{year:04d}-{m:02d}-{d:02d}", f"{year:04d}-{m:02d}-{d:02d}"])
                  if not off:
                      continue
                  # 3. 上班日期
                  work = []
                  work_pat = re.compile(r"(\d{1,2})月(\d{1,2})日[（(][^）)]*[）)]?上班")
                  for m in work_pat.finditer(detail):
                      mo, day = int(m.group(1)), int(m.group(2))
                      date_str = f"{year:04d}-{mo:02d}-{day:02d}"
                      if date_str not in work:
                          work.append(date_str)
                  # 为每个假期名创建对象
                  for name in names:
                      obj = {"n": name.strip(), "off": off}
                      if work:
                          obj["work"] = work
                      holidays.append(obj)
              return holidays

          def filter_december_only(holidays):
              """仅保留涉及12月的假期"""
              return [h for h in holidays if any("-12-" in d for off in h["off"] for d in off)]

          def main():
              output_path = "holiday_xiao.json"
              try:
                  current_year = datetime.now().year
                  target_years = [current_year - 1, current_year, current_year + 1]
                  results = []

                  for year in target_years:
                      print(f"搜索 {year} 年通知链接...")
                      link = search_detail_link(year)
                      if not link:
                          print(f"  未找到 {year} 年通知链接，跳过")
                          continue
                      print(f"  详情页：{link}")
                      detail_html = get_text(link)
                      holidays = parse_detail_page(detail_html, year)
                      if not holidays:
                          print(f"  警告：{year} 年未解析出假期数据")
                          continue

                      # 上一年数据仅保留12月假期
                      if year == current_year - 1:
                          holidays = filter_december_only(holidays)
                          if not holidays:
                              print(f"  {year} 年无12月假期，跳过")
                              continue
                          print(f"  保留 {year} 年12月假期：{[h['n'] for h in holidays]}")

                      results.append({"y": year, "h": holidays})

                  if not results:
                      print("⚠️ 最终无数据，生成空JSON。")
                      with open(output_path, "w", encoding="utf-8") as f:
                          json.dump([], f)
                      return

                  results.sort(key=lambda x: x["y"])
                  with open(output_path, "w", encoding="utf-8") as f:
                      json.dump(results, f, ensure_ascii=False, indent=2)

                  # 添加元数据
                  meta = {
                      "last_updated": beijing_now().isoformat(),
                      "source": "Gov.cn detail pages",
                      "years": [r["y"] for r in results]
                  }
                  with open(output_path, "r+", encoding="utf-8") as f:
                      data = json.load(f)
                      data.insert(0, {"_meta": meta})
                      f.seek(0)
                      json.dump(data, f, ensure_ascii=False, indent=2)
                      f.truncate()
                  print(f"✅ 成功生成 {output_path}，年份：{meta['years']}")

              except Exception:
                  print("❌ 脚本异常：")
                  traceback.print_exc()
                  # 生成包含错误信息的JSON文件，避免工作流完全失败
                  with open(output_path, "w", encoding="utf-8") as f:
                      json.dump({
                          "_meta": {"last_updated": beijing_now().isoformat(), "error": traceback.format_exc()}
                      }, f, ensure_ascii=False, indent=2)

          if __name__ == "__main__":
              main()
          PYEOF
          python3 fetch_holiday.py

      - name: 4. 检查并提交更新
        run: |
          if [ ! -f holiday_xiao.json ]; then
            echo "❌ 文件未生成，任务终止"
            exit 1
          fi
          ls -lh holiday_xiao.json
          echo "文件内容预览："
          head -30 holiday_xiao.json

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add holiday_xiao.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
            git commit -m "🤖 自动更新节假日安排 [${BEIJING_TIME} 北京时间]"
            git push origin HEAD:main
            echo "✅ 更新已推送"
          fi
