name: Auto Update Chinese Holiday Calendar

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/holidayxiao-update.yml'
  schedule:
    # 北京时间每月5、15、25日 21:00 (UTC 13:00)
    - cron: '0 13 5,15,25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holiday-data:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. Setup Python and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 selenium lxml

      - name: 2.5 Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: 3. Fetch holiday data (2020-2026) and generate JSON
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          cat > fetch_holiday.py << 'PYEOF'
          import requests
          from bs4 import BeautifulSoup
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import json
          import re
          import time
          import os
          from datetime import datetime

          SEARCH_URL_TEMPLATE = "https://sousuo.www.gov.cn/sousuo/search.shtml?code=17da70961a7&searchWord={year}年部分节假日安排的通知"
          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              'Accept-Language': 'zh-CN,zh;q=0.9',
          }

          def _normalize_numbers(text: str) -> str:
              """全角数字转半角"""
              full_to_half = {
                  '０': '0', '１': '1', '２': '2', '３': '3', '４': '4',
                  '５': '5', '６': '6', '７': '7', '８': '8', '９': '9'
              }
              for full, half in full_to_half.items():
                  text = text.replace(full, half)
              return text

          def _remove_brackets(text: str) -> str:
              """删除所有中英文括号及内部内容，避免括号内文字干扰日期解析"""
              text = re.sub(r'（[^）]*）', '', text)
              text = re.sub(r'\([^)]*\)', '', text)
              return text

          def get_full_date(year: int, month: int, day: int) -> str:
              return f"{year:04d}-{month:02d}-{day:02d}"

          def parse_holiday_text(year: int, text: str):
              """解析节假日通知，去除括号干扰后按句子提取日期。"""
              text = _normalize_numbers(text)
              text = _remove_brackets(text)
              holidays = []
              blocks = re.split(r'(?=(?:[一二三四五六七八九十]+|\d+)、)', text)
              for block in blocks:
                  block = block.strip()
                  if not block:
                      continue
                  name_match = re.match(r'(?:[一二三四五六七八九十]+|\d+)、(.+?)：', block)
                  if not name_match:
                      continue
                  name = name_match.group(1).strip()
                  body = block[name_match.end():].strip()

                  off_dates = []
                  work_dates = set()
                  work_sents = re.findall(r'[^。；]*(?:上班)[^。；]*', body)
                  for ws in work_sents:
                      for m, d in re.findall(r'(\d{1,2})月(\d{1,2})日', ws):
                          work_dates.add(get_full_date(year, int(m), int(d)))

                  off_sents = re.findall(r'[^。；]*(?:放假|休假)[^。；]*', body)
                  for osent in off_sents:
                      cross = re.search(r'(\d{1,2})月(\d{1,2})日.*?至.*?(\d{1,2})月(\d{1,2})日', osent)
                      if cross:
                          m1, d1, m2, d2 = map(int, cross.groups())
                          off_dates.append([get_full_date(year, m1, d1), get_full_date(year, m2, d2)])
                          continue
                      same = re.search(r'(\d{1,2})月(\d{1,2})日.*?至.*?(\d{1,2})日', osent)
                      if same:
                          m1, d1, d2 = map(int, same.groups())
                          off_dates.append([get_full_date(year, m1, d1), get_full_date(year, m1, d2)])
                          continue
                      single = re.search(r'(\d{1,2})月(\d{1,2})日', osent)
                      if single:
                          m, d = map(int, single.groups())
                          off_dates.append([get_full_date(year, m, d), get_full_date(year, m, d)])
                  item = {"n": name, "off": off_dates}
                  if work_dates:
                      item["work"] = sorted(work_dates)
                  holidays.append(item)
              return holidays

          def search_detail_url(driver, year: int):
              search_url = SEARCH_URL_TEMPLATE.format(year=year)
              print(f"  搜索: {search_url}")
              driver.get(search_url)
              try:
                  WebDriverWait(driver, 15).until(
                      EC.presence_of_element_located((By.CSS_SELECTOR, ".result, .basic_result_content .item"))
                  )
              except:
                  print("  等待搜索结果超时，跳过该年份")
                  return None
              time.sleep(2)
              soup = BeautifulSoup(driver.page_source, 'lxml')
              target_url = None
              for a_tag in soup.find_all('a', href=True):
                  title = a_tag.get_text(strip=True)
                  if f'{year}年部分节假日安排的通知' in title:
                      target_url = a_tag['href']
                      print(f"  匹配到链接: {target_url}")
                      break
              if not target_url:
                  print("  未找到通知链接")
                  return None
              if target_url.startswith('/'):
                  target_url = 'https://www.gov.cn' + target_url
              elif not target_url.startswith('http'):
                  target_url = 'https://www.gov.cn/' + target_url
              return target_url

          def fetch_detail(year: int, url: str):
              print(f"  详情页: {url}")
              try:
                  resp = requests.get(url, headers=HEADERS, timeout=20)
                  resp.raise_for_status()
              except Exception as e:
                  print(f"  详情页请求失败: {e}")
                  return None
              soup = BeautifulSoup(resp.content, 'lxml')
              content_div = soup.find('div', class_='pages_content') or soup.find('div', id='UCAP-CONTENT')
              if not content_div:
                  content_div = soup.find('div', class_='article')
              return content_div.get_text() if content_div else soup.get_text()

          def format_json_compact(obj, indent=0, is_top=True):
              """自定义紧凑JSON输出，普通数组自动单行"""
              if isinstance(obj, dict):
                  if not obj:
                      return '{}'
                  items = []
                  for k, v in obj.items():
                      key_str = json.dumps(k, ensure_ascii=False)
                      val_str = format_json_compact(v, indent + 2, is_top=False)
                      items.append(' ' * (indent + 2) + key_str + ': ' + val_str)
                  return '{\n' + ',\n'.join(items) + '\n' + ' ' * indent + '}'
              elif isinstance(obj, list):
                  if not obj:
                      return '[]'
                  all_simple = all(isinstance(x, (str, int, float, bool, type(None))) for x in obj)
                  all_simple_lists = all(isinstance(x, list) and all(isinstance(y, (str, int, float, bool, type(None))) for y in x) for x in obj)
                  if all_simple or all_simple_lists:
                      return json.dumps(obj, ensure_ascii=False, separators=(',', ':'))
                  else:
                      items = []
                      for v in obj:
                          items.append(' ' * (indent + 2) + format_json_compact(v, indent + 2, is_top=False))
                      return '[\n' + ',\n'.join(items) + '\n' + ' ' * indent + ']'
              else:
                  return json.dumps(obj, ensure_ascii=False)

          def main():
              chrome_options = Options()
              chrome_options.add_argument("--headless=new")
              chrome_options.add_argument("--no-sandbox")
              chrome_options.add_argument("--disable-dev-shm-usage")
              chrome_options.add_argument("--disable-gpu")
              chrome_options.add_argument("--window-size=1920,1080")
              chrome_options.add_argument(f"user-agent={HEADERS['User-Agent']}")
              chrome_bin = os.environ.get("CHROME_BIN")
              if chrome_bin:
                  chrome_options.binary_location = chrome_bin

              # 固定抓取2020-2026年
              years_to_fetch = list(range(2020, 2027))
              all_data = []

              driver = webdriver.Chrome(options=chrome_options)
              try:
                  for year in years_to_fetch:
                      print(f"\n=== 处理 {year} 年 ===")
                      detail_url = search_detail_url(driver, year)
                      if not detail_url:
                          print(f"  跳过 {year} 年（未发布或搜索不到）")
                          continue
                      text = fetch_detail(year, detail_url)
                      if not text:
                          print(f"  跳过 {year} 年（无法获取详情）")
                          continue
                      holidays = parse_holiday_text(year, text)
                      if not holidays:
                          print(f"  未解析到任何节日")
                          continue
                      all_data.append({"y": year, "h": holidays})
                      print(f"  成功解析 {len(holidays)} 个节日")
              finally:
                  driver.quit()

              all_data.sort(key=lambda x: x['y'])
              with open('holiday_xiao.json', 'w', encoding='utf-8') as f:
                  f.write(format_json_compact(all_data, 0))
              print(f"\n已生成 holiday_xiao.json，包含 {len(all_data)} 年的数据")

          if __name__ == '__main__':
              main()
          PYEOF
          echo "开始抓取 2020-2026 年节假日数据..."
          python3 fetch_holiday.py

      - name: 4. Show generated file
        run: |
          if [ -f holiday_xiao.json ]; then
            python3 -m json.tool holiday_xiao.json | head -30
            python3 -c "import json; data=json.load(open('holiday_xiao.json')); print([d['y'] for d in data])"
          else
            echo "错误: holiday_xiao.json 未生成"
            exit 1
          fi

      - name: 5. Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add holiday_xiao.json
          if git diff --staged --quiet; then
            echo "数据无变化，不提交"
          else
            git commit -m "🤖 自动更新中国节假日数据(2020-2026) [$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M') 北京时间]"
            git push
            echo "已提交更新"
          fi
