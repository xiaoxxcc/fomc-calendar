name: Auto Update Chinese Holiday Calendar

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/holidayxiao-update.yml'
  schedule:
    # 北京时间每月5、15、25日 13:00 → UTC 05:00
    - cron: '0 5 5,15,25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holiday-data:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. Setup Python and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 selenium lxml

      - name: 3. Fetch holiday data and generate JSON
        run: |
          cat > fetch_holiday.py << 'PYEOF'
          import requests
          from bs4 import BeautifulSoup
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import json
          import re
          import time
          from datetime import datetime

          SEARCH_URL_TEMPLATE = "https://sousuo.www.gov.cn/sousuo/search.shtml?code=17da70961a7&searchWord={year}年部分节假日安排的通知"
          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              'Accept-Language': 'zh-CN,zh;q=0.9',
          }

          def get_full_date(year: int, month: int, day: int) -> str:
              return f"{year:04d}-{month:02d}-{day:02d}"

          def parse_holiday_text(year: int, text: str):
              """精准解析节假日文本，支持有/无调休、单日/区间、联合节日"""
              holidays = []
              blocks = re.split(r'(?=(?:[一二三四五六七八九十]+|\d+)、)', text)
              for block in blocks:
                  if not block.strip():
                      continue
                  match_name = re.match(r'(?:[一二三四五六七八九十]+|\d+)、(.+?)：', block)
                  if not match_name:
                      continue
                  name = match_name.group(1).strip()
                  content = block[match_name.end():].strip()

                  # 1. 提取放假日期区间（仅从含“放假”且不含“上班”的分句中取）
                  off_list = []
                  # 按句号或分号分割，找出放假相关句子
                  sentences = re.split(r'[。；]', content)
                  holiday_sentence = ''
                  for s in sentences:
                      if '放假' in s and '上班' not in s:
                          holiday_sentence = s.strip()
                          break
                  if not holiday_sentence:
                      # 若找不到，使用整个 content（兼容简单格式）
                      holiday_sentence = content

                  # 尝试跨月区间：X月X日至Y月Z日
                  cross_month = re.search(r'(\d{1,2})月(\d{1,2})日\s*至\s*(\d{1,2})月(\d{1,2})日', holiday_sentence)
                  if cross_month:
                      m1, d1, m2, d2 = map(int, cross_month.groups())
                      off_list.append([get_full_date(year, m1, d1), get_full_date(year, m2, d2)])
                  else:
                      # 尝试同月区间：X月X日至X日（月份省略）
                      same_month = re.search(r'(\d{1,2})月(\d{1,2})日\s*至\s*(\d{1,2})日', holiday_sentence)
                      if same_month:
                          m, d1, d2 = int(same_month.group(1)), int(same_month.group(2)), int(same_month.group(3))
                          off_list.append([get_full_date(year, m, d1), get_full_date(year, m, d2)])
                      else:
                          # 单日：X月X日
                          single = re.search(r'(\d{1,2})月(\d{1,2})日', holiday_sentence)
                          if single:
                              m, d = int(single.group(1)), int(single.group(2))
                              off_list.append([get_full_date(year, m, d), get_full_date(year, m, d)])

                  # 2. 提取上班日期（从全文提取，排除放假区间内的日期）
                  work_dates = []
                  for m, d in re.findall(r'(\d{1,2})月(\d{1,2})日(?=[^。]*上班)', content):
                      work_dates.append(get_full_date(year, int(m), int(d)))
                  work_dates = sorted(set(work_dates))

                  holiday_obj = {"n": name, "off": off_list}
                  if work_dates:
                      holiday_obj["work"] = work_dates
                  holidays.append(holiday_obj)
              return holidays

          def search_detail_url(driver, year: int):
              search_url = SEARCH_URL_TEMPLATE.format(year=year)
              print(f"  搜索: {search_url}")
              driver.get(search_url)
              try:
                  WebDriverWait(driver, 15).until(
                      EC.presence_of_element_located((By.CSS_SELECTOR, ".result, .basic_result_content .item"))
                  )
              except:
                  print("  等待搜索结果超时，跳过该年份")
                  return None
              time.sleep(2)
              soup = BeautifulSoup(driver.page_source, 'lxml')
              target_url = None
              for a_tag in soup.find_all('a', href=True):
                  title = a_tag.get_text(strip=True)
                  if f'{year}年部分节假日安排的通知' in title:
                      target_url = a_tag['href']
                      print(f"  匹配到链接: {target_url}")
                      break
              if not target_url:
                  print("  未找到通知链接")
                  return None
              if target_url.startswith('/'):
                  target_url = 'https://www.gov.cn' + target_url
              elif not target_url.startswith('http'):
                  target_url = 'https://www.gov.cn/' + target_url
              return target_url

          def fetch_detail(year: int, url: str):
              print(f"  详情页: {url}")
              try:
                  resp = requests.get(url, headers=HEADERS, timeout=20)
                  resp.raise_for_status()
              except Exception as e:
                  print(f"  详情页请求失败: {e}")
                  return None
              soup = BeautifulSoup(resp.content, 'lxml')
              content_div = soup.find('div', class_='pages_content') or soup.find('div', id='UCAP-CONTENT')
              if not content_div:
                  content_div = soup.find('div', class_='article')
              if not content_div:
                  return soup.get_text()
              return content_div.get_text()

          def filter_december_holidays(holidays, year):
              """只保留12月的假期"""
              filtered = []
              for h in holidays:
                  has_dec = False
                  for start, end in h['off']:
                      if f'{year}-12-' in start or f'{year}-12-' in end:
                          has_dec = True
                          break
                  if has_dec:
                      filtered.append(h)
              return filtered

          def main():
              chrome_options = Options()
              chrome_options.add_argument("--headless=new")
              chrome_options.add_argument("--no-sandbox")
              chrome_options.add_argument("--disable-dev-shm-usage")
              chrome_options.add_argument("--disable-gpu")
              chrome_options.add_argument("--window-size=1920,1080")
              chrome_options.add_argument(f"user-agent={HEADERS['User-Agent']}")

              current_year = datetime.now().year
              years_to_fetch = [current_year - 1, current_year, current_year + 1]
              all_data = []

              driver = webdriver.Chrome(options=chrome_options)
              try:
                  for year in years_to_fetch:
                      print(f"\n=== 处理 {year} 年 ===")
                      detail_url = search_detail_url(driver, year)
                      if not detail_url:
                          print(f"  跳过 {year} 年（未发布或搜索不到）")
                          continue
                      text = fetch_detail(year, detail_url)
                      if not text:
                          print(f"  跳过 {year} 年（无法获取详情）")
                          continue
                      holidays = parse_holiday_text(year, text)
                      if not holidays:
                          print(f"  未解析到任何节日")
                          continue

                      if year == current_year - 1:
                          print("  过滤上一年数据，仅保留12月假日")
                          holidays = filter_december_holidays(holidays, year)
                          if not holidays:
                              print("  12月无假期数据，跳过该年份")
                              continue

                      all_data.append({
                          "y": year,
                          "h": holidays
                      })
                      print(f"  成功解析 {len(holidays)} 个节日")
              finally:
                  driver.quit()

              all_data.sort(key=lambda x: x['y'])
              with open('holiday_xiao.json', 'w', encoding='utf-8') as f:
                  json.dump(all_data, f, ensure_ascii=False, indent=2)
              print(f"\n已生成 holiday_xiao.json，包含 {len(all_data)} 年数据")

          if __name__ == '__main__':
              main()
          PYEOF
          echo "开始执行节假日数据抓取..."
          python3 fetch_holiday.py

      - name: 4. Show generated file
        run: |
          if [ -f holiday_xiao.json ]; then
            echo "=== holiday_xiao.json 内容预览 ==="
            python3 -m json.tool holiday_xiao.json | head -30
            echo "=== 数据年份: ==="
            python3 -c "import json; data=json.load(open('holiday_xiao.json')); print([d['y'] for d in data])"
          else
            echo "错误: holiday_xiao.json 未生成"
            exit 1
          fi

      - name: 5. Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add holiday_xiao.json
          if git diff --staged --quiet; then
            echo "数据无变化，不提交"
          else
            git commit -m "🤖 自动更新中国节假日数据 [$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M') 北京时间]"
            git push
            echo "已提交更新"
          fi
