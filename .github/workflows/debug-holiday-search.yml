name: Debug Holiday Search Page

on:
  workflow_dispatch  # 手动触发，不影响正常流程

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout 仓库
        uses: actions/checkout@v4

      - name: 2. 安装依赖
        run: pip install requests beautifulsoup4 lxml

      - name: 3. 抓取搜索页并保存快照
        run: |
          python3 << 'EOF'
          import requests
          from bs4 import BeautifulSoup

          # 测试用搜索链接
          url = "https://sousuo.www.gov.cn/sousuo/search.shtml?code=17da70961a7&searchWord=2025年部分节假日安排的通知"
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              'Accept-Language': 'zh-CN,zh;q=0.9'
          }
          try:
              resp = requests.get(url, headers=headers, timeout=20)
              resp.raise_for_status()
              # 保存原始HTML
              with open("debug_search_page.html", "w", encoding="utf-8") as f:
                  f.write(resp.text)
              print("✅ 已保存搜索结果快照 -> debug_search_page.html")
              print(f"   状态码: {resp.status_code}, 内容长度: {len(resp.text)}")

              # 同时打印页面中所有链接的标题，方便快速定位
              soup = BeautifulSoup(resp.text, 'lxml')
              print("\n🔍 页面中所有链接（前30条）:")
              count = 0
              for a_tag in soup.find_all('a', href=True):
                  title = a_tag.get_text(strip=True)
                  if title:
                      count += 1
                      print(f"   {count}. {title[:80]}  -> {a_tag['href']}")
                      if count >= 30:
                          break
          except Exception as e:
              print(f"❌ 抓取失败: {e}")
          EOF

      - name: 4. 提交调试文件到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add debug_search_page.html
          if git diff --staged --quiet; then
            echo "没有变更，无需提交"
          else
            git commit -m "🔍 调试: 添加2025年节假日搜索页快照"
            git push
            echo "✅ 已提交，请查看仓库中的 debug_search_page.html"
          fi
